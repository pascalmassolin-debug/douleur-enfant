    const storage = {
      async list(prefix) {
        const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
        return { keys };
      },
      async get(key) {
        const v = localStorage.getItem(key);
        return v ? { value: v } : null;
      },
      async set(key, value) {
        localStorage.setItem(key, value);
        return { key, value };
      }
    };

          {l:"Distraction (dessin animé, musique au casque)",ok:true,c_ok:"Son regard se pose sur l'écran. Son corps se détend légèrement. La distraction cognitive occupe les ressources corticales et atténue la perception douloureuse.",c_ko:null},
          {l:"Impliquer le parent activement",ok:true,c_ok:"Le parent parle doucement à son enfant. L'enfant répond progressivement à la voix rassurante. La co-régulation parent-enfant est un outil thérapeutique puissant.",c_ko:null},
          {l:"Respiration guidée douce",ok:true,c_ok:"L'enfant suit le rythme respiratoire proposé. Son corps se détend imperceptiblement. Le tonus sympathique diminue.",c_ko:null},
          {l:"Repartir sans intervenir ('il ne dit rien')",ok:false,c_ok:null,c_ko:"20 minutes plus tard, le parent appelle en urgence : l'enfant pleure. L'absence d'expression verbale n'est pas synonyme d'absence de douleur. La douleur intériorisée est un piège clinique classique à 5 ans."},
          {l:"Augmenter l'éclairage et allumer la TV pour 'stimuler'",ok:false,c_ok:null,c_ko:"L'enfant se recroqueville et se couvre les yeux. L'hyperstimulation sensorielle augmente le stress et la perception douloureuse. L'environnement doit être apaisé, pas stimulé."},
        ],
        win:"Après évaluation (FPS-R 4/10), la prise en charge est mise en place. À la réévaluation : 2/10. L'enfant accepte un câlin de son parent.",
      },
      {
        id:5, emoji:"😖", tag:"Enfant · 2 ans", soin:"Injection intramusculaire",
        base:"Un enfant de 2 ans est allongé pour une injection intramusculaire. Il ne pleure pas encore, mais vous observez des modifications physiques.",
        clues:[
          {id:"c5a",cat:"👁️",lab:"Observer les membres inférieurs",find:"Jambes tendues, rigides, immobiles. Position anormale pour son âge — hypertonie des membres inférieurs."},
          {id:"c5b",cat:"🌡️",lab:"Observer la respiration",find:"Respiration rapide et superficielle (~40 mouvements/min). Nettement au-dessus de la normale pour un enfant de 2 ans."},
          {id:"c5c",cat:"👁️",lab:"Observer les mains et le tronc",find:"Poings serrés des deux côtés. Tension des avant-bras. Corps globalement crispé et hypertonique."},
          {id:"c5d",cat:"💬",lab:"Interroger le parent",find:"« Il est toujours comme ça quand il a peur. Mais là c'est plus intense qu'avant le vaccin la dernière fois. »"},
          {id:"c5e",cat:"📋",lab:"Vérifier l'état du soin",find:"L'injection n'a pas encore été réalisée. L'enfant voit le soignant préparer la seringue à côté de lui depuis 2 minutes."},
          {id:"c5f",cat:"🌡️",lab:"Observer l'ensemble du tableau",find:"Tachypnée + hypertonie généralisée avant tout geste. Tableau de réponse neurovégétative marquée."},
        ],
        minClues:3,
        analysis:{
          q:"Comment interprétez-vous les signes que vous observez chez cet enfant de 2 ans ?",
          opts:[
            {l:"Douleur probable",s:"Les signes physiologiques orientent vers une nociception imminente",ok:true},
            {l:"Données insuffisantes / à explorer",s:"Impossible de conclure sans plus d'éléments",ok:false},
            {l:"Plutôt réaction émotionnelle",s:"Réaction de peur sans stimulus nociceptif actif",ok:false},
          ],
          cons:[
            null,
            "Vous cherchez encore des données. L'injection est réalisée sans préparation. Score FLACC : 8/10. Tachypnée + hypertonie généralisée avant tout geste = activation neurovégétative classique avant douleur aiguë. L'action préventive était déjà justifiée.",
            "Vous réalisez l'injection sans préparation. Score FLACC : 8/10. L'enfant hurle. La tachypnée et l'hypertonie que vous observiez étaient des signaux neurovégétatifs d'activation du système nociceptif — pas seulement de la peur.",
          ],
          expl:"Tachypnée + hypertonie généralisée avant le geste = activation du système nerveux sympathique. Ces signes neurovégétatifs sont des indicateurs fiables de douleur aiguë imminente. Les pleurs ne sont pas obligatoires pour conclure à une nociception probable.",
        },
        scales:{
          q:"Quelle(s) échelle(s) pour évaluer cet enfant de 2 ans ?",
          opts:[
            {l:"FLACC",s:"6 mois–7 ans · 5 items comportementaux · hétéroévaluation",ok:true,cons:null},
            {l:"EVENDOL",s:"Naissance–7 ans · 5 items comportementaux",ok:true,cons:null},
            {l:"FPS-R",s:"Auto-évaluation · compréhension insuffisante à 2 ans",ok:false,cons:"Vous présentez la FPS-R à l'enfant de 2 ans. Il pointe successivement plusieurs visages sans lien avec son état réel. À 2 ans, la compréhension de la consigne d'auto-évaluation est impossible — cette capacité cognitive se développe seulement vers 4 ans."},
            {l:"EVA",s:"Impossible avant 8 ans",ok:false,cons:"Vous montrez l'EVA à l'enfant de 2 ans. Il regarde la réglette sans la moindre compréhension. Aucun lien ne peut être fait entre son ressenti et une échelle spatiale abstraite."},
          ],
          multi:true,
          expl:"À 2 ans : hétéroévaluation obligatoire. FLACC et EVENDOL sont les deux échelles recommandées. Score FLACC ≥ 3/10 justifie une prise en charge.",
        },
        methods:[
          {l:"Position contenante (emmaillotage, cocon)",ok:true,c_ok:"L'hypertonie diminue progressivement. Les poings se desserrent légèrement. La contenance reproduit les sensations utérines et réduit la réponse de stress.",c_ko:null},
          {l:"Présence parentale active (tenir, parler, chanter)",ok:true,c_ok:"La respiration de l'enfant ralentit légèrement. La voix et le contact familiers activent les systèmes de régulation du stress.",c_ko:null},
          {l:"Distraction active (bulles de savon, jouet)",ok:true,c_ok:"Les bulles captent l'attention quelques secondes pendant l'injection. La distraction visuelle détourne partiellement le cerveau du stimulus douloureux.",c_ko:null},
          {l:"Comptine / voix rassurante",ok:true,c_ok:"L'enfant reconnaît le rythme de la comptine. Sa respiration s'adapte légèrement. Les circuits apaisants sont activés.",c_ko:null},
          {l:"Succion non nutritive (tétine)",ok:true,c_ok:"La tétine est acceptée. La succion active le système de modulation de la douleur. La tachypnée diminue légèrement.",c_ko:null},
          {l:"Imagerie guidée 'va dans ton endroit préféré'",ok:false,c_ok:null,c_ko:"L'enfant vous regarde sans comprendre. À 2 ans, l'imaginaire dirigé n'est pas encore accessible. La technique est sans effet observable."},
          {l:"Jeu thérapeutique (poupée de soin)",ok:false,c_ok:null,c_ko:"L'enfant regarde sans intérêt. À 2 ans, la symbolisation par le jeu de rôle préparatoire n'est pas suffisamment développée."},
        ],
        win:"Score FLACC pendant l'injection : 3/10 au lieu de 8/10 sans préparation. L'enfant pleure mais est rapidement consolé dans les bras de son parent.",
      },
    ];

    const CASE_MAX = c => 2 + 2 + c.methods.filter(m=>m.ok).length;
    const TOTAL_MAX = CASES.reduce((s,c)=>s+CASE_MAX(c),0);

    function childState(methods, sel) {
      const okCount = methods.filter(m=>m.ok).length;
      if (!okCount) return 0;
      const okSel = methods.filter((m,i)=>m.ok&&sel.includes(i)).length;
      const badSel = methods.filter((m,i)=>!m.ok&&sel.includes(i)).length;
      return Math.max(0, Math.min(100, Math.round((okSel/okCount)*100 - badSel*25)));
    }
    function stateLabel(pct) {
      if (pct>=100) return {icon:"😊",label:"Enfant apaisé — objectif atteint !",col:P.green,bg:P.greenL};
      if (pct>=65)  return {icon:"🙂",label:"Bonne évolution",col:P.teal,bg:P.tealL};
      if (pct>=35)  return {icon:"😟",label:"Amélioration partielle",col:P.amber,bg:P.amberL};
      return          {icon:"😰",label:"Situation préoccupante",col:P.red,bg:P.redL};
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [nameInput, setNameInput] = useState("");
      const [player, setPlayer] = useState("");
      const [ci, setCi] = useState(0);
      const [phase, setPhase] = useState("investigate");
      const [flipped, setFlipped] = useState(new Set());
      const [flipping, setFlipping] = useState(new Set());
      const [anaSel, setAnaSel] = useState(null);
      const [anaAttempts, setAnaAttempts] = useState(0);
      const [anaCons, setAnaCons] = useState(null);
      const [anaScore, setAnaScore] = useState(0);
      const [scaSel, setScaSel] = useState([]);
      const [scaAttempts, setScaAttempts] = useState(0);
      const [scaCons, setScaCons] = useState(null);
      const [scaScore, setScaScore] = useState(0);
      const [methSel, setMethSel] = useState([]);
      const [methApplied, setMethApplied] = useState(false);
      const [methAttempts, setMethAttempts] = useState(0);
      const [methScore, setMethScore] = useState(0);
      const [caseScores, setCaseScores] = useState([]);
      const [totalScore, setTotalScore] = useState(0);
      const [lb, setLb] = useState([]);
      const [ak, setAk] = useState(0);

      useEffect(()=>{loadLb();},[]);

      async function loadLb() {
        try {
          const r = await window.storage.list("dnmsescape_");
          if (r?.keys?.length) {
            const items = await Promise.all(r.keys.map(async k=>{
              try{const x=await window.storage.get(k);return x?JSON.parse(x.value):null;}catch{return null;}
            }));
            setLb(items.filter(Boolean).sort((a,b)=>b.score-a.score).slice(0,12));
          }
        } catch {}
      }
      async function saveLb(name,score) {
        try {
          const k=`dnmsescape_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
          await window.storage.set(k,JSON.stringify({name,score,max:TOTAL_MAX,ts:Date.now()}));
          loadLb();
        } catch {}
      }

      const c = CASES[ci];

      function startGame() {
        const n=nameInput.trim(); if(!n) return;
        setPlayer(n); resetCase(0); setTotalScore(0); setCaseScores([]); setAk(k=>k+1); setScreen("game");
      }

      function resetCase(idx) {
        setCi(idx); setPhase("investigate");
        setFlipped(new Set()); setFlipping(new Set());
        setAnaSel(null); setAnaAttempts(0); setAnaCons(null); setAnaScore(0);
        setScaSel([]); setScaAttempts(0); setScaCons(null); setScaScore(0);
        setMethSel([]); setMethApplied(false); setMethAttempts(0); setMethScore(0);
        setAk(k=>k+1);
      }

      function flipCard(id) {
        if (flipping.has(id)||flipped.has(id)) return;
        setFlipping(p=>new Set([...p,id]));
        setTimeout(()=>{
          setFlipped(p=>new Set([...p,id]));
          setFlipping(p=>{const n=new Set(p);n.delete(id);return n;});
        },200);
      }

      function submitAnalysis() {
        if (anaSel===null) return;
        const isOk = c.analysis.opts[anaSel].ok;
        const attempts = anaAttempts+1;
        setAnaAttempts(attempts);
        if (isOk) {
          const pts = attempts===1?2:attempts===2?1:0;
          setAnaScore(pts); setAnaCons(null); setPhase("scale");
        } else {
          const consText = c.analysis.cons[anaSel];
          setAnaCons({text:consText, showAnswer:attempts>=2});
        }
      }
      function retryAnalysis() { setAnaSel(null); setAnaCons(null); }
      function forceNextFromAnalysis() { setAnaScore(0); setAnaCons(null); setPhase("scale"); }

      function toggleSca(i) { if(scaCons) return; setScaSel(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]); }
      function submitScale() {
        if (!scaSel.length) return;
        const opts = c.scales.opts;
        const correctAll = opts.filter(o=>o.ok);
        const selOk = scaSel.filter(i=>opts[i]?.ok).length;
        const selBad = scaSel.filter(i=>!opts[i]?.ok);
        const isOk = selOk===correctAll.length && selBad.length===0;
        const attempts = scaAttempts+1;
        setScaAttempts(attempts);
        if (isOk) {
          const pts = attempts===1?2:attempts===2?1:0;
          setScaScore(pts); setScaCons(null); setPhase("intervene");
        } else {
          let consText;
          if (selBad.length > 0) {
            consText = opts[selBad[0]]?.cons || "Cette échelle n'est pas adaptée à l'âge de cet enfant.";
          } else {
            const firstMissingIdx = opts.findIndex((o,i) => o.ok && !scaSel.includes(i));
            consText = (firstMissingIdx>=0 && opts[firstMissingIdx]?.cons_missing) || "Votre sélection est partiellement correcte, mais il manque une ou plusieurs échelles recommandées pour cet âge.";
          }
          setScaCons({text:consText, showAnswer:attempts>=2});
        }
      }
      function retrySca() { setScaSel([]); setScaCons(null); }
      function forceNextFromScale() { setScaScore(0); setScaCons(null); setPhase("intervene"); }

      function toggleMeth(i) { if(methApplied) return; setMethSel(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]); }
      function applyMethods() {
        if (!methSel.length) return;
        const state = childState(c.methods, methSel);
        const attempts = methAttempts+1;
        setMethAttempts(attempts);
        setMethApplied(true);
        const okSel = c.methods.filter((m,i)=>m.ok&&methSel.includes(i)).length;
        if (state>=100) {
          setMethScore(okSel);
          setTimeout(()=>setPhase("done"),300);
        } else if (attempts>=2) {
          setMethScore(okSel);
        }
      }
      function reviseMethods() { setMethApplied(false); }

      function finishCase() {
        const total = anaScore+scaScore+methScore;
        const newScores = [...caseScores, {ana:anaScore,sca:scaScore,meth:methScore,max:CASE_MAX(c),total}];
        setCaseScores(newScores);
        const newTotal = totalScore+total;
        setTotalScore(newTotal);
        if (ci+1<CASES.length) { resetCase(ci+1); }
        else { saveLb(player,newTotal); setScreen("result"); }
      }

      const cState = useMemo(()=>childState(c.methods,methSel),[methSel,ci]);
      const cStateInfo = stateLabel(cState);
      const pct = TOTAL_MAX>0?Math.round((totalScore/TOTAL_MAX)*100):0;
      const badge = pct>=85?{icon:"🏆",l:"Expert en DNMS"}:pct>=65?{icon:"⭐",l:"Praticien confirmé"}:pct>=40?{icon:"📚",l:"En bonne voie"}:{icon:"💪",l:"Continue à apprendre"};

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
            *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
            @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
            @keyframes pop{0%{transform:scale(.9);opacity:0}65%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
            @keyframes sdown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
            @keyframes cardflip{0%{transform:scale(1) rotateY(0);}50%{transform:scale(.85) rotateY(90deg);opacity:0;}100%{transform:scale(1) rotateY(0);opacity:1;}}
            @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
            .fadein{animation:fadeUp .3s ease both}
            .popin{animation:pop .36s ease both}
            .sdown{animation:sdown .24s ease both}
            .flipping{animation:cardflip .4s ease both}
            .clue:not(.revealed):hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 24px rgba(26,111,168,.3)!important}
            .clue{transition:transform .14s,box-shadow .14s;cursor:pointer;}
            .clue.revealed{cursor:default;}
            .optcard:not([data-done]):hover{transform:translateY(-2px);border-color:#1A6FA8!important;box-shadow:0 5px 16px rgba(26,111,168,.15)!important}
            .optcard{transition:transform .14s,border-color .14s,box-shadow .14s;cursor:pointer}
            .optcard[data-done]{cursor:default}
            .mrow:not([data-done]):hover{background:#EAF5FF!important;border-color:#1A6FA8!important}
            .mrow{transition:background .12s,border-color .12s;cursor:pointer}
            .mrow[data-done]{cursor:default}
            button{cursor:pointer;border:none;outline:none;}
            ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#B5D4F4;border-radius:4px}
          `}</style>

          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",minHeight:"100vh",background:P.bg,padding:"14px 12px",display:"flex",flexDirection:"column",alignItems:"center"}}>

            {screen==="home" && (
              <div className="popin" style={{maxWidth:540,width:"100%",textAlign:"center",paddingTop:24}}>
                <svg width="180" height="120" viewBox="0 0 180 120" fill="none" style={{marginBottom:8}}>
                  <ellipse cx="90" cy="100" rx="65" ry="14" fill="#C8E6F5" opacity="0.4"/>
                  <path d="M60 50 Q58 80 90 88 Q122 80 120 50 L120 35 Q120 18 90 16 Q60 18 60 35 Z" fill={P.priL} opacity="0.12"/>
                  <ellipse cx="90" cy="72" rx="20" ry="13" fill="#FFD4B2"/>
                  <circle cx="90" cy="55" r="13" fill="#FFB98A"/>
                  <circle cx="86" cy="54" r="1.5" fill="#1A3A5C"/>
                  <circle cx="94" cy="54" r="1.5" fill="#1A3A5C"/>
                  <path d="M86 59 Q90 62 94 59" stroke="#C0714A" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                  <ellipse cx="70" cy="76" rx="9" ry="6" fill={P.priL} opacity="0.3"/>
                  <ellipse cx="110" cy="76" rx="9" ry="6" fill={P.priL} opacity="0.3"/>
                  <rect x="130" y="38" width="5" height="16" rx="2.5" fill={P.pri} opacity="0.45"/>
                  <rect x="124" y="44" width="16" height="5" rx="2.5" fill={P.pri} opacity="0.45"/>
                  <circle cx="35" cy="30" r="3.5" fill={P.priL} opacity="0.5"/>
                  <circle cx="148" cy="28" r="2.5" fill={P.teal} opacity="0.55"/>
                  <circle cx="156" cy="60" r="4" fill="#E05A3A" opacity="0.3"/>
                  <circle cx="26" cy="65" r="3" fill={P.priL} opacity="0.4"/>
                </svg>
                <h1 style={{fontWeight:800,fontSize:"clamp(22px,5vw,36px)",color:P.pri,margin:"0 0 6px",lineHeight:1.15}}>Gestion de la douleur</h1>
                <p style={{fontWeight:600,fontSize:14,color:P.teal,margin:"0 0 4px"}}>Approches non médicamenteuses · Enfant 0–6 ans</p>
                <p style={{fontSize:12,color:P.gray,margin:"0 0 22px"}}>Simulation clinique interactive</p>
                <div style={{background:"white",borderRadius:18,padding:"16px 18px",marginBottom:18,boxShadow:"0 6px 24px rgba(26,111,168,.09)",textAlign:"left"}}>
                  <p style={{fontWeight:700,fontSize:13,color:"#1E3A50",margin:"0 0 12px"}}>Comment fonctionne la simulation ?</p>
                  {[
                    {icon:"🔍",t:"Investiguer",s:"Retournez les cartes d'indices pour reconstituer le tableau clinique complet"},
                    {icon:"🩺",t:"Analyser & Évaluer",s:"Classifiez la situation et choisissez l'échelle d'évaluation adaptée"},
                    {icon:"🎯",t:"Intervenir",s:"Construisez un plan de soin et observez l'état de l'enfant évoluer en temps réel"},
                  ].map(({icon,t,s},i)=>(
                    <div key={i} style={{display:"flex",gap:12,padding:"9px 0",borderBottom:i<2?`1px solid ${P.priXL}`:"none",alignItems:"flex-start"}}>
                      <span style={{fontSize:20,lineHeight:1.3,flexShrink:0,marginTop:1}}>{icon}</span>
                      <div>
                        <p style={{margin:0,fontWeight:700,fontSize:13,color:"#1E3A50"}}>{t}</p>
                        <p style={{margin:"1px 0 0",fontSize:12,color:P.gray}}>{s}</p>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{background:P.priXL,borderRadius:12,padding:"10px 14px",marginBottom:18,textAlign:"left",borderLeft:`3px solid ${P.pri}`}}>
                  <p style={{fontSize:12,color:P.pri,margin:0,fontWeight:500}}>💡 Si votre analyse n'est pas la bonne, la situation clinique évolue et vous guide vers la bonne stratégie — sans jamais vous dire simplement « faux ».</p>
                </div>
                <button onClick={()=>setScreen("name")} style={{background:grad,color:"white",fontSize:16,fontWeight:700,padding:"14px 52px",borderRadius:50,boxShadow:"0 6px 22px rgba(26,111,168,.38)"}}>
                  Commencer la simulation
                </button>
                <p style={{fontSize:12,color:P.gray,marginTop:12}}>5 situations · Classement sauvegardé localement</p>
              </div>
            )}

            {screen==="name" && (
              <div className="popin" style={{maxWidth:360,width:"100%",textAlign:"center",paddingTop:44}}>
                <div style={{fontSize:50,marginBottom:12}}>👤</div>
                <h2 style={{fontWeight:800,fontSize:22,color:P.pri,margin:"0 0 5px"}}>Qui joue ?</h2>
                <p style={{color:"#94A3B8",fontSize:13,margin:"0 0 20px"}}>Ton prénom pour le classement</p>
                <input type="text" placeholder="Ton prénom..." value={nameInput}
                  onChange={e=>setNameInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&startGame()} autoFocus
                  style={{width:"100%",padding:"13px 16px",fontSize:16,border:`2px solid ${P.priXL}`,borderRadius:13,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,color:"#1E3A50",background:"white",textAlign:"center",marginBottom:12,display:"block",outline:"none"}}/>
                <button onClick={startGame} disabled={!nameInput.trim()} style={{width:"100%",padding:13,fontSize:15,fontWeight:700,background:nameInput.trim()?grad:"#E5E7EB",color:nameInput.trim()?"white":"#9CA3AF",borderRadius:13,transition:"all .2s"}}>
                  C'est parti !
                </button>
              </div>
            )}

            {screen==="game" && (
              <div style={{maxWidth:660,width:"100%",paddingTop:4}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
                  <span style={{background:"white",padding:"6px 13px",borderRadius:50,fontSize:13,fontWeight:600,color:P.pri,boxShadow:"0 2px 8px rgba(26,111,168,.1)"}}>{player}</span>
                  <div style={{display:"flex",gap:4}}>
                    {CASES.map((_,i)=><div key={i} style={{width:i===ci?26:18,height:6,borderRadius:3,background:i<ci?P.teal:i===ci?P.pri:"rgba(26,111,168,.18)",transition:"all .3s"}}/>)}
                  </div>
                  <span style={{background:grad,padding:"6px 13px",borderRadius:50,fontSize:13,fontWeight:700,color:"white"}}>{totalScore} pts</span>
                </div>

                <div style={{background:"white",borderRadius:16,padding:"14px 16px",marginBottom:10,boxShadow:"0 4px 14px rgba(26,111,168,.08)",borderTop:`4px solid ${P.pri}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                    <span style={{fontSize:30}}>{c.emoji}</span>

                        {[{l:"Analyse",v:anaScore,m:2},{l:"Échelle",v:scaScore,m:2},{l:"Méthodes",v:methScore,m:c.methods.filter(m=>m.ok).length}].map(({l,v,m})=>(
                          <div key={l} style={{flex:1,background:P.priXL,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                            <p style={{fontWeight:800,fontSize:20,color:P.pri,margin:"0 0 2px"}}>{v}<span style={{fontSize:12,color:"#94A3B8",fontWeight:400}}>/{m}</span></p>
                            <p style={{fontSize:11,color:P.gray,margin:0}}>{l}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                    <button onClick={finishCase} style={{width:"100%",padding:13,fontSize:14,fontWeight:700,background:grad,color:"white",borderRadius:13}}>
                      {ci+1<CASES.length?`Situation ${ci+2} : ${CASES[ci+1].tag} →`:"Voir mes résultats 🎉"}
                    </button>
                  </div>
                )}
              </div>
            )}

            {screen==="result" && (
              <div className="popin" style={{maxWidth:520,width:"100%",paddingTop:20}}>
                <div style={{textAlign:"center",marginBottom:18}}>
                  <div style={{fontSize:56,marginBottom:7}}>{badge.icon}</div>
                  <h2 style={{fontWeight:800,fontSize:22,color:P.pri,margin:"0 0 3px"}}>{player}</h2>
                  <p style={{fontWeight:600,fontSize:15,color:P.teal,margin:0}}>{badge.l}</p>
                </div>
                <div style={{background:"white",borderRadius:18,padding:"20px",marginBottom:12,boxShadow:"0 6px 22px rgba(26,111,168,.09)",textAlign:"center",borderTop:`4px solid ${P.pri}`}}>
                  <div style={{fontWeight:800,fontSize:46,color:P.pri,lineHeight:1}}>{totalScore}<span style={{fontSize:16,color:"#CBD5E1",fontWeight:400}}> / {TOTAL_MAX}</span></div>
                  <p style={{fontSize:12,color:"#CBD5E1",margin:"3px 0 12px"}}>points</p>
                  <div style={{height:9,background:P.priXL,borderRadius:5,overflow:"hidden",marginBottom:5}}>
                    <div style={{height:"100%",width:`${pct}%`,background:grad,borderRadius:5,transition:"width 1.2s ease"}}/>
                  </div>
                  <p style={{fontSize:13,color:P.pri,fontWeight:700,margin:0}}>{pct}% de réussite</p>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                  {CASES.map((cas,i)=>{
                    const s=caseScores[i]||{};
                    return (
                      <div key={i} style={{background:"white",borderRadius:13,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 7px rgba(26,111,168,.06)",borderLeft:`3px solid ${(s.total||0)>=(CASE_MAX(cas)*0.7)?P.teal:P.pri}`}}>
                        <span style={{fontSize:20}}>{cas.emoji}</span>
                        <div style={{flex:1}}>
                          <p style={{margin:0,fontWeight:700,fontSize:13,color:"#1E3A50"}}>{cas.tag}</p>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:3}}>
                            {[{l:"Analyse",v:s.ana,m:2},{l:"Échelle",v:s.sca,m:2},{l:"Méthodes",v:s.meth,m:cas.methods.filter(m=>m.ok).length}].map(({l,v,m})=>(
                              <span key={l} style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:50,background:v===m?P.greenL:v>0?P.amberL:P.redL,color:v===m?P.green:v>0?P.amber:P.red}}>
                                {l} {v}/{m}
                              </span>
                            ))}
                          </div>
                        </div>
                        <span style={{fontWeight:800,fontSize:15,color:P.pri}}>{s.total||0} pts</span>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:9}}>
                  <button onClick={()=>setScreen("leaderboard")} style={{flex:1,background:"white",color:P.pri,fontSize:13,fontWeight:700,padding:13,borderRadius:13,border:`2px solid ${P.priXL}`}}>🏆 Classement</button>
                  <button onClick={()=>{setNameInput("");setScreen("home");}} style={{flex:1,background:grad,color:"white",fontSize:13,fontWeight:700,padding:13,borderRadius:13}}>🔄 Rejouer</button>
                </div>
              </div>
            )}

            {screen==="leaderboard" && (
              <div style={{maxWidth:460,width:"100%",paddingTop:20}}>
                <div style={{textAlign:"center",marginBottom:14}}>
                  <h2 style={{fontWeight:800,fontSize:22,color:P.pri,margin:"0 0 3px"}}>🏆 Classement</h2>
                  <p style={{fontSize:12,color:"#94A3B8",margin:0}}>Score maximum : {TOTAL_MAX} points</p>
                </div>
                {lb.length===0 ? (
                  <div style={{background:"white",borderRadius:16,padding:28,textAlign:"center",color:"#CBD5E1",fontSize:14}}>Soyez le premier !</div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                    {lb.map((e,i)=>(
                      <div key={i} style={{background:i===0?"#FFFDE7":"white",borderRadius:12,padding:"10px 15px",display:"flex",alignItems:"center",gap:10,border:i===0?"2px solid #FFD700":`1px solid ${P.priXL}`}}>
                        <span style={{fontSize:17,minWidth:22}}>{["🥇","🥈","🥉"][i]||`${i+1}.`}</span>
                        <span style={{flex:1,fontWeight:700,fontSize:14,color:"#1E3A50"}}>{e.name}</span>
                        <span style={{fontSize:11,color:"#94A3B8"}}>{Math.round((e.score/TOTAL_MAX)*100)}%</span>
                        <span style={{fontWeight:800,fontSize:15,color:P.pri}}>{e.score} pts</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:9}}>
                  <button onClick={()=>setScreen("result")} style={{flex:1,background:"white",color:P.pri,fontSize:13,fontWeight:700,padding:12,borderRadius:12,border:`2px solid ${P.priXL}`}}>← Résultats</button>
                  <button onClick={()=>{setNameInput("");setScreen("home");}} style={{flex:1,background:grad,color:"white",fontSize:13,fontWeight:700,padding:12,borderRadius:12}}>🔄 Rejouer</button>
                </div>
              </div>
            )}

          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
